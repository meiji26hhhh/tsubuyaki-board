# # -----------------------------------------------------------------------------
# # （任意）自動 revert を有効化する場合:
# #   誤爆（講師の正当な main 更新まで巻き戻す）を防ぐため、必ず上の instructors 許可リストで
# #   講師を除外したうえで使うこと。具体的には:
# #     1. permissions に `contents: write` を追加
# #     2. 上記 step の前に actions/checkout（fetch-depth: 0）で main を取得
# #     3. 許可リスト外の場合のみ `git revert --no-edit <SHA> && git push origin main` するステップを追加
# #   既定では無効（通知のみ）。受講生のコミットを勝手に消すリスクがあるため、運用に慣れるまでは
# #   「通知 → 講師が手動 revert」を推奨する。
