# # =============================================================================
# # protect-main.yml — 共有 main 保護の CI 監視（GitHub Actions）
# #
# # 目的:
# #   本研修は 1 つの共有リポを全受講生で使い、共有 main は配布時のスターターのまま
# #   温存する（誰も更新しない）。GitHub Free の private リポでは branch protection /
# #   ruleset が強制されないため、main への push を「事前に reject」する手段が無い。
# #   本 Workflow は main への push を検知し、講師許可リスト外のアカウントによる push を
# #   Issue で通知する「検知 + 通知」層（instructor-setup-guide.md §4 の 4 層防御の 3 層目）。
# #
# # 設定（講師がここを編集）:
# #   下の script 内 `instructors` 配列に、main を更新してよいアカウント（講師）の
# #   GitHub ユーザ名を列挙する。ここに無いアカウントが main へ push すると Issue で通知される。
# #
# # 動作とコスト:
# #   - main への push 時のみ起動する（受講生は自分の <github-id> ブランチへ push するため
# #     ほぼ起動しない）→ Free private の 2,000 分/月枠をほぼ消費しない。
# #   - 既定は「Issue 通知」のみ（巻き戻しはしない）。講師が確認のうえ git revert で是正する
# #     （instructor-setup-guide.md §9-3）。自動 revert は誤爆防止のため既定で無効（末尾コメント参照）。
# #
# # 制約（重要）:
# #   GitHub Actions は push 完了後に走るため、push 自体を reject することはできない
# #   （真の事前ブロックは GitHub Enterprise Server の pre-receive hook のみ）。本 Workflow は
# #   あくまで是正のための「検知」であり、予防ではない。
# # =============================================================================
