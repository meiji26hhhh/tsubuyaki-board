name: Template Check

# テンプレートリポ生成直後のリポでテンプレ整合性を検査する。
# テンプレ本体 (is_template == true) では走らせない。
on:
  push:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  template-check:
    if: ${{ github.event.repository.is_template == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 必須ファイル存在チェック
        shell: bash
        run: |
          set -e
          required=(
            AGENTS.md
            README.md
            .codex/config.toml
            compose.yaml
            scripts/doctor.sh
            scripts/run-codex.sh
            scripts/build-codex-image.sh
            scripts/setup.ps1
            scripts/setup-wsl.sh
            pom.xml
            containers/codex-devbox/Containerfile
            containers/oracle-init/01_create_schema.sql
            src/main/resources/db/migration/V1__init.sql
          )
          missing=()
          for f in "${required[@]}"; do
            if [[ ! -f "$f" ]]; then
              missing+=("$f")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::必須ファイル不足: ${missing[*]}"
            exit 1
          fi
          echo "✅ 必須ファイル OK"

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: mvnw -v 動作確認
        shell: bash
        run: |
          if [[ -x ./mvnw ]]; then
            ./mvnw -v
          else
            echo "::warning::mvnw 未生成。setup-wsl.sh で生成してください"
            mvn -v
          fi

      - name: actionlint
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color

      - name: yamllint (compose.yaml と application*.yml)
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: 'compose.yaml src/main/resources/application.yml src/main/resources/application-local.yml src/main/resources/application-h2.yml'
          format: github
          strict: false

      - name: 未置換プレースホルダ検出
        shell: bash
        run: |
          set -e
          # .codex/prompts/ 配下は意図的にプレースホルダが残るので除外
          if grep -RIn --include='*.md' --exclude-dir='.codex/prompts' --exclude-dir='instructor' '<<[A-Z]\+>>' . ; then
            echo "::warning::ドキュメント中にプレースホルダが残っています"
          fi

      - name: README / ONBOARDING のリンク切れチェック
        uses: lycheeverse/lychee-action@v1
        continue-on-error: true
        with:
          args: --no-progress --max-redirects 5 README.md ONBOARDING.md AGENTS.md
          fail: false
