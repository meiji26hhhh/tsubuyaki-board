# =========================================================================
# 社内つぶやきボード 研修用 Codex CLI 設定 (プロジェクトローカル設定)
#
# - キー名は Codex CLI 0.1xx 系 (2026-06 時点) の公式スキーマに合わせている。
#   最新仕様は公式リファレンスを正とする:
#   https://developers.openai.com/codex/config-reference
# - リポ直下の .codex/config.toml は「trusted なプロジェクト」でのみ読み込まれる。
#   研修コンテナでは entrypoint.sh が研修専用 CODEX_HOME 側に
#   `[projects."/workspace"] trust_level = "trusted"` を自動追記して有効化する。
# - 設定変更は講師がこのファイルを編集し、upstream リポの main に反映する（受講生の fork には
#   影響しない）。run-codex.sh は研修専用 CODEX_HOME
#   (`~/.codex-training/tsubuyaki-board`) に履歴・認証情報を隔離する。
# - 本設定は「Codex への約束事 (設定層)」であり、最終的な物理ブロックは
#   コンテナの研修ハーネス (containers/codex-devbox/bin/*-guard.sh +
#   scripts/run-codex.sh のマスクマウント) で別途行われる。多層防御の最内殻。
# - Codex への指示 (プロンプト層) は AGENTS.md / .codex/instructions.md に集約する。
#   旧 `instructions` キーは現行 CLI では予約済み (機能しない) ため使用しない。
# =========================================================================

# --- 既定モデルと推論強度 -------------------------------------------------
# gpt-5-codex / gpt-5.1-codex 系は deprecated (順次提供終了)。
# 2026-06 時点の標準モデルは gpt-5.5。軽量タスク向けには gpt-5.4-mini もある。
model = "gpt-5.5"
# 有効値: minimal | low | medium | high | xhigh (xhigh は対応モデルのみ)
model_reasoning_effort = "medium"

# --- 承認モード -----------------------------------------------------------
# 通常自走し、サンドボックス外の操作が必要なときのみ受講生に確認する (講師推奨)。
# 旧 "on-failure" は非推奨化されたため "on-request" を使う。
# 安全最優先で運用したい講義回は "untrusted" に切替えると、信頼済みコマンド以外が
# 毎回確認になる。
approval_policy = "on-request"

# --- サンドボックス -------------------------------------------------------
# /workspace 配下と Maven キャッシュは書き込み可、それ以外は read-only
sandbox_mode = "workspace-write"

# --- 環境変数のホワイトリスト ---------------------------------------------
# 注: ORACLE_PWD / ORACLE_APP_PWD は意図的に除外 (機密値の Codex 露出を防ぐ)。
# 同様に AWS_* / GH_TOKEN / GITHUB_TOKEN なども include_only に入れない限り渡らない。
[shell_environment_policy]
inherit = "core"
include_only = [
    "JAVA_HOME",
    "MAVEN_OPTS",
    "TZ",
    "LANG",
    "SPRING_PROFILES_ACTIVE",
]

# --- workspace-write のサブ設定 -------------------------------------------
[sandbox_workspace_write]
network_access = true
writable_roots = [
    "/workspace",
    "/home/codex/.m2",
]

# --- ネットワーク先の制限について -----------------------------------------
# 旧版にあった独自の [network] allowlist セクションは現行 CLI のスキーマに存在しない
# ため削除した。通信先の制限は AGENTS.md §7.2 (プロンプト層) とコンテナ層 (L1-L3) で
# 担保する。ドメイン単位の許可リストが必要な場合は、公式の permissions プロファイル
# (https://developers.openai.com/codex/permissions) を講師が別途検討する。

# --- ツール許可 -----------------------------------------------------------
[tools]
# 現行 CLI は web 検索が既定で有効になったため、研修中は明示的にオフ (脱線防止)。
# 仕上げフェーズ以降の応用課題で true に切り替え可。
web_search = false

# --- 履歴 -----------------------------------------------------------------
[history]
# 研修では通常の受講生ホームではなく scripts/run-codex.sh が用意する
# 研修専用 CODEX_HOME (~/.codex-training/tsubuyaki-board) に履歴を隔離する。
persistence = "save-all"
max_bytes = 1000000

# --- MCP サーバ (応用課題用、デフォルトは空) ------------------------------
[mcp_servers]
