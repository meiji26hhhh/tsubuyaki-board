# =========================================================================
# テスト時の Spring 設定上書き
# - h2 プロファイルを有効化し、application-h2.yml を読ませる
# - @DataJpaTest が組み込み DB に置き換えないようにする
# =========================================================================
spring:
  profiles:
    active: h2
  test:
    database:
      replace: none
